[Settings]
language = en
folder = ~/.wallpaper
monitors = All
wallpaper = ~/.wallpaper/screenshot_2026-01-11_20-40-42.png
show_path_in_tooltip = True
backend = swaybg
fill = fill
sort = name
color = #ffffff
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = wal -i $wallpaper && ~/.config/scripts/waybar.sh
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 90
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = ~/.config/waypaper/style.css

