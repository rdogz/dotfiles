#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,20
env = XCURSOR_THEME,Bibata-Modern-Ice

env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps

# To ebable obs
env = QT_QPA_PLATFORM="wayland;xcb"

windowrule = opacity 1.0 override 0.7, match:class librewolf
windowrule = opacity 1.0 override 0.7, match:class firefox
windowrule = opacity 1.0 override 0.7, match:class chromium
windowrule = opacity 1.0 override 0.7, match:class discord
windowrule = opacity 1.0 override 0.7, match:class brave-browser

windowrule = opacity 0.9 override 0.7 override 0.8 override, match:class kitty

windowrule = opacity 1.0, match:fullscreen 1

